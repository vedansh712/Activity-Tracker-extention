<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Tracker - Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>🕒 Activity Tracker Settings</h1>
        <p class="subtitle">Manage your website redirection rules</p>
      </header>

      <div class="main-content">
        <section class="add-rule-section">
          <h2>Add New Redirection Rule</h2>
          <div class="form-container">
            <div class="form-row">
              <label for="sourceDomain">From Domain:</label>
              <input
                type="text"
                id="sourceDomain"
                placeholder="e.g., youtube.com"
                class="form-input"
              />
            </div>
            <div class="form-row">
              <label for="targetUrl">Redirect To:</label>
              <input
                type="url"
                id="targetUrl"
                placeholder="e.g., https://nextjs.org/learn/dashboard-app"
                class="form-input"
              />
            </div>
            <div class="form-row">
              <label for="timeLimit">Time Limit (minutes):</label>
              <input
                type="number"
                id="timeLimit"
                placeholder="60"
                min="1"
                max="1440"
                class="form-input"
              />
            </div>
            <div class="form-row">
              <label for="warningTime"
                >Warning Time (minutes before limit):</label
              >
              <input
                type="number"
                id="warningTime"
                placeholder="5"
                min="1"
                max="60"
                class="form-input"
              />
            </div>
            <button id="addRuleBtn" class="btn btn-primary">Add Rule</button>
          </div>
        </section>

        <section class="rules-section">
          <h2>Active Redirection Rules</h2>
          <div id="rulesContainer" class="rules-container">
            <div class="loading">Loading rules...</div>
          </div>
          <div id="noRulesMessage" class="no-rules" style="display: none">
            No redirection rules configured. Add your first rule above!
          </div>
        </section>

        <section class="daily-stats-section">
          <h2>Today's Time Tracking</h2>
          <div id="dailyStatsContainer" class="daily-stats-container">
            <div class="loading">Loading daily statistics...</div>
          </div>
        </section>
      </div>

      <footer class="footer">
        <p>Rules are applied daily and reset at midnight</p>
        <button id="clearAllRulesBtn" class="btn btn-danger">
          Clear All Rules
        </button>
      </footer>
    </div>

    <script src="settings.js"></script>
  </body>
</html>
